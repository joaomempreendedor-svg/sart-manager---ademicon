<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SART Manager | Ademicon</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
              // OVERRIDE SLATE TO REMOVE BLUE TINT
              // Using Zinc/Neutral scale for a "True Black" feel
              slate: {
                50: '#fafafa',
                100: '#f4f4f5',
                200: '#e4e4e7',
                300: '#d4d4d8',
                400: '#a1a1aa',
                500: '#71717a',
                600: '#52525b',
                700: '#27272a', // Borders: Dark Gray
                800: '#18181b', // Cards: Zinc 900 (Neutral Dark)
                900: '#09090b', // Background: Zinc 950 (Almost Black)
                950: '#000000', // Pure Black
              },
              brand: {
                50: '#fff5eb',
                100: '#ffe0c2',
                200: '#ffcc99',
                300: '#ffb870',
                400: '#ffa347',
                500: '#ff7a00', // Main Ademicon Color
                600: '#e66e00',
                700: '#cc6200',
                800: '#a34e00',
                900: '#7a3b00',
              },
              dark: {
                bg: '#09090b',       // Zinc 950
                card: '#18181b',     // Zinc 900
                border: '#27272a',   // Zinc 800
                text: '#f4f4f5',     // Zinc 100
                muted: '#a1a1aa'     // Zinc 400
              }
            },
            borderRadius: {
              'xl': '12px', // Custom border radius for cards
              'lg': '8px',  // Custom border radius for components
              'md': '6px',
              'sm': '4px',
              'full': '9999px',
            },
            boxShadow: {
              'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
              'md': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
              'lg': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
              'xl': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
              '2xl': '0 25px 50px -12px rgba(0, 0, 0, 0.25)',
              '3xl': '0 35px 60px -15px rgba(0, 0, 0, 0.3)',
              'inner': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
              'glass': '0 8px 32px 0 rgba( 31, 38, 135, 0.37 )', // Glassmorphism shadow
              'glow-sm': '0 0 8px rgba(255, 122, 0, 0.4)',
              'glow-md': '0 0 16px rgba(255, 122, 0, 0.6)',
            },
            keyframes: {
              shimmer: {
                '100%': { transform: 'translateX(100%)' },
              },
              'fade-in': {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'pulse-glow': {
                '0%, 100%': { boxShadow: '0 0 0 0 rgba(255, 122, 0, 0.4)' },
                '50%': { boxShadow: '0 0 0 6px rgba(255, 122, 0, 0)' },
              },
              'border-spin': {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              },
            },
            animation: {
              shimmer: 'shimmer 1.5s infinite',
              'fade-in': 'fade-in 0.5s ease-out forwards',
              'pulse-glow': 'pulse-glow 2s infinite',
              'border-spin': 'border-spin 4s linear infinite',
            },
            backgroundImage: {
              'gradient-header': 'linear-gradient(to right, var(--tw-gradient-stops))',
            },
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
<style>
  /* Global override to remove focus outline for all interactive elements */
  /* WARNING: This can negatively impact accessibility for keyboard users. */
  /* Use with caution and ensure alternative visual focus indicators are provided. */
  *:focus {
    outline: none !important;
    box-shadow: none !important;
    -webkit-box-shadow: none !important;
  }
</style>
</head>
  <body class="bg-gray-50 text-gray-900 dark:bg-slate-900 dark:text-slate-50 transition-colors duration-200">
    <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
